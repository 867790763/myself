<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        const canvas = document.querySelector('#cvs1');
        const renderer = new THREE.WebGLRenderer({ antialias: false, canvas });
        // 正交相机 适用于2D投影场景
        //  const width = 60;
        // const height = 30;
        // const camera = new THREE.OrthographicCamera( width / - 2, width / 2, height / 2, height / - 2, 1, 1000 );
        // 透明相机 适用于3D渲染场景
        const camera = new THREE.PerspectiveCamera(75, 2, 0.1, 40);
        camera.position.z = 30;
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f5); // 浅灰色背景
        // const geometry = new THREE.SphereGeometry( 15, 32, 32, 90); // 球形几何体
        // const geometry = new THREE.BoxGeometry( 16, 16, 16 ); // 盒型几何体
        // const geometry = new THREE.CapsuleGeometry(5, 5, 10, 20, 1); //胶囊几何体
        const geometry = new THREE.CapsuleGeometry(5, 5, 10, 20, 1); //胶囊几何体
        const material = new THREE.LineBasicMaterial( { color: 0xffff00 } ); // 线条基本材质
        const cube = new THREE.Mesh( geometry, material );
        scene.add( cube );
        // 添加线条覆盖
        const wireframe = new THREE.LineSegments(
            new THREE.WireframeGeometry(geometry),
            new THREE.LineBasicMaterial({ color: 0x000000 })
        );
        scene.add(wireframe)
        // 灯光
        const color = 0xFFFFFF;
        const intensity = 3; // intensity n. 强烈;强度
        const light = new THREE.DirectionalLight(color, intensity); // directionalLight 定向光
        scene.add(light);
        function render(time) {
            cube.rotation.x = time / 2000; // rotation n. 旋转;转动
            cube.rotation.y = time / 2000;
            wireframe.rotation.x = time / 2000;
            wireframe.rotation.y = time / 2000;
            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }
        // 渲染循环函数
        requestAnimationFrame(render);
    </script>
</head>
<body>
    <canvas id="cvs1"></canvas>
</body>
</html>
