<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>My first three.js app</title>
    <style>
      body { margin: 0;}
    </style>
    <script type="importmap">
    {
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
    }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        const renderer = new THREE.WebGLRenderer(window,innerWidth, window.innerHeight);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 500);
        camera.position.set(0, 0, 50);
        camera.lookAt(0, 0, 0);
        const scene = new THREE.Scene();
        // 创建一个蓝色LineBasicMaterial 材质
        const material = new THREE.LineBasicMaterial({ color: 0x0000ff });
        // 创建一个带顶点的几何体
        const points = [];
        points.push(new THREE.Vector3(0, 10, 0));
        points.push(new THREE.Vector3(-10, 0, 0));
        points.push(new THREE.Vector3(0, -10, 0));
        points.push(new THREE.Vector3(10, 0, 0));
        points.push(new THREE.Vector3(0, 0, 0));
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        // 组合成一条线
        const line = new THREE.Line(geometry, material);
        // 渲染线条
        scene.add(line);
        renderer.render(scene, camera)
    </script>
  </head>
  <body>
  </body>
</html>
